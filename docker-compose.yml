version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    restart: always
    networks:
      - taskbloom-net

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - backend
    networks:
      - taskbloom-net

networks:
  taskbloom-net:
    driver: bridge
